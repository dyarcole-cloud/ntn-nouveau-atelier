# NTN Nouveau — git-based Vite build on Netlify.
# Replaces the old CLI-leaked config (which had absolute local Windows paths
# and no build command). Production now builds from the repo.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback. Netlify serves matching static files (assets, /sw.js,
# /manifest.webmanifest, icons) and functions FIRST; only unknown paths
# rewrite to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
