  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#22D3EE" stroke-width="3" stroke-opacity="0.55"/>
  <text x="256" y="396" font-family="Georgia, 'Times New Roman', serif" font-size="370" font-style="italic" fill="url(#n)" text-anchor="middle" filter="url(#glow)">n</text>
