      <stop offset="0" stop-color="#16161E"/>
      <stop offset="0.6" stop-color="#08080C"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#F0ABFC"/>
